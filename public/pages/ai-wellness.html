html { scroll-behavior: smooth; }
body {

@keyframes fadeSlideDown {
  from { opacity: 0; transform: translateY(-18px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }

  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }

@keyframes spin {
  to { transform: rotate(360deg); }

  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(30px, -20px) scale(1.05); }
  66% { transform: translate(-20px, 15px) scale(0.97); }

  50% { transform: scale(1.04); }

@keyframes chatIn {

  to { opacity: 1; transform: translateY(0); }

@keyframes dotBounce {

  30% { transform: translateY(-6px); }

// ===== HELPERS =====
function detectDiet(pref) {
  const p = (pref || "").toLowerCase();
  if (p.includes("keto") || p.includes("low carb")) return "keto";
  if (p.includes("vegan") || p.includes("plant")) return "vegan";
  if (p.includes("nonveg") || p.includes("non veg") || p.includes("chicken") || p.includes("meat") || p.includes("fish") || p.includes("egg")) return "nonveg";
  return "vegetarian";
}

function pickMealItem(diet, cat, used) {
  const db = MEALS[diet] || MEALS.vegetarian;
  const list = (db[cat] || db.snack).filter(m => !used.includes(m.name));
  if (!list.length) return { ...(db[cat] || db.snack)[0] };
  return { ...list[Math.floor(Math.random() * list.length)] };
}

function getCoachReply(msg) {
  const m = msg.toLowerCase();
  for (const entry of COACH_KNOWLEDGE) {
    if (entry.keys.some(k => m.includes(k))) return entry.reply;
  }
  return "That's a great wellness question! 🌿 The fundamentals always win: consistent sleep (7–9 hrs), adequate protein (0.8g/kg), 8+ glasses of water, 30 min daily movement, and stress management. Small consistent habits compound into massive results over time! 💪";
}

  const [typing, setTyping] = useState(false);
  const chatRef = useRef(null);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages, typing]);

  const send = async () => {
    const msg = input.trim();
    if (!msg || typing) return;
    setInput('');
    setMessages(prev => [...prev, { type: 'user', text: msg }]);
    setTyping(true);
    await pause(600 + Math.random() * 500);
    setTyping(false);
    setMessages(prev => [...prev, { type: 'bot', text: getCoachReply(msg) }]);
  };

  const handleKey = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };

// ===== MEAL SUGGESTER =====
function MealSuggester() {
  const [proteinGoal, setProteinGoal] = useState(55);
  const [calorieGoal, setCalorieGoal] = useState(2000);
  const [foodPref, setFoodPref] = useState('vegetarian');
  const [mealType, setMealType] = useState('full_day');
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);

  const suggest = async () => {
    setLoading(true);
    setResult(null);
    await pause(950);

    const diet = detectDiet(foodPref);
    const dietLabel = { vegan: 'Vegan', vegetarian: 'Vegetarian', nonveg: 'Non-Vegetarian', keto: 'Keto' }[diet];
    const noPaneer = foodPref.toLowerCase().includes('no paneer');
    let meals = [];
    const used = [];

    const tryPick = (cat) => {
      let m = pickMealItem(diet, cat, used);
      let tries = 0;
      while (noPaneer && m.name.toLowerCase().includes('paneer') && tries < 8) {
        m = pickMealItem(diet, cat, used); tries++;
      }
      used.push(m.name);
      return m;
    };

    if (mealType === 'full_day') {
      const cats = ['breakfast', 'lunch', 'snack', 'dinner'];
      const calWeights = [0.22, 0.32, 0.16, 0.30];
      cats.forEach((cat, i) => {
        const m = tryPick(cat);
        const sf = Math.min(Math.max((calorieGoal * calWeights[i]) / m.calories, 0.75), 1.35);
        meals.push({ label: cat.charAt(0).toUpperCase() + cat.slice(1), name: m.name, desc: m.desc, protein: Math.round(m.protein * sf), calories: Math.round(m.calories * sf) });
      });
    } else {
      const catMap = { breakfast: 'breakfast', lunch: 'lunch', dinner: 'dinner', snack: 'snack' };
      const cat = catMap[mealType] || 'snack';
      const m = tryPick(cat);
      meals.push({ label: cat.charAt(0).toUpperCase() + cat.slice(1), name: m.name, desc: m.desc, protein: m.protein, calories: m.calories });
    }

    const totalP = meals.reduce((s, m) => s + m.protein, 0);
    const totalC = meals.reduce((s, m) => s + m.calories, 0);
    let label = dietLabel;
    if (noPaneer) label += ' (No Paneer)';

    setResult({ meals, totalP, totalC, label, mealType });
    setLoading(false);
  };

  const cardColors = ['#fce7f3', '#ede9fe', '#dbeafe', '#d1fae5'];

  return (
    <Card>
      <div style={{ marginBottom: '20px' }}>
        <h2 style={{ fontFamily: 'var(--fd)', fontSize: '22px', fontWeight: 700, marginBottom: '5px', display: 'flex', alignItems: 'center', gap: '8px' }}>
          <span>🥗</span> AI Meal Suggester
        </h2>
        <p style={{ color: 'var(--tx2)', fontSize: '13px' }}>Get personalized meals based on your protein goals, diet type, and preferences.</p>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '16px' }}>
        {[
          { label: 'Daily protein goal (grams)', val: proteinGoal, set: setProteinGoal, type: 'number', min: 20, max: 300 },
          { label: 'Daily calorie goal', val: calorieGoal, set: setCalorieGoal, type: 'number', min: 800, max: 5000 },
        ].map(({ label, val, set, type, min, max }) => (
          <div key={label}>
            <label style={{ display: 'block', fontSize: '11px', fontWeight: 700, color: 'var(--tx2)', marginBottom: '5px', textTransform: 'uppercase', letterSpacing: '0.05em' }}>{label}</label>
            <input type={type} value={val} onChange={e => set(Number(e.target.value))} min={min} max={max}
              style={{ width: '100%', padding: '10px 14px', border: '1.5px solid var(--cb)', borderRadius: 'var(--rs)', fontFamily: 'var(--ff)', fontSize: '13px', background: 'var(--bg3)', color: 'var(--tx)', outline: 'none' }}
            />
          </div>
        ))}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '22px' }}>
        <div>
          <label style={{ display: 'block', fontSize: '11px', fontWeight: 700, color: 'var(--tx2)', marginBottom: '5px', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Food preference / restrictions</label>
          <input value={foodPref} onChange={e => setFoodPref(e.target.value)} placeholder="e.g. vegan, vegetarian, keto, no paneer"
            style={{ width: '100%', padding: '10px 14px', border: '1.5px solid var(--cb)', borderRadius: 'var(--rs)', fontFamily: 'var(--ff)', fontSize: '13px', background: 'var(--bg3)', color: 'var(--tx)', outline: 'none' }}
            onFocus={e => e.target.style.borderColor = 'var(--p1)'} onBlur={e => e.target.style.borderColor = 'var(--cb)'}
          />
        </div>
        <div>
          <label style={{ display: 'block', fontSize: '11px', fontWeight: 700, color: 'var(--tx2)', marginBottom: '5px', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Which meal?</label>
          <select value={mealType} onChange={e => setMealType(e.target.value)}
            style={{ width: '100%', padding: '10px 14px', border: '1.5px solid var(--cb)', borderRadius: 'var(--rs)', fontFamily: 'var(--ff)', fontSize: '13px', background: 'var(--bg3)', color: 'var(--tx)', outline: 'none', cursor: 'pointer' }}>
            <option value="full_day">📋 Full day meal plan</option>
            <option value="breakfast">🌅 Breakfast only</option>
            <option value="lunch">☀️ Lunch only</option>
            <option value="dinner">🌙 Dinner only</option>
            <option value="snack">🍎 Snack only</option>
          </select>
        </div>
      </div>

      <button onClick={suggest} disabled={loading} style={{
        display: 'inline-flex', alignItems: 'center', gap: '8px',
        padding: '13px 28px', background: 'var(--g1)', color: '#fff',
        border: 'none', borderRadius: '999px', fontFamily: 'var(--ff)',
        fontSize: '14px', fontWeight: 700, cursor: loading ? 'not-allowed' : 'pointer',
        transition: 'var(--t)', boxShadow: '0 4px 18px rgba(244,114,182,0.35)',
        opacity: loading ? 0.8 : 1
      }}>
        {loading ? '⏳ Crafting your plan…' : '🥗 Suggest Meals'}
      </button>

      {loading && <div style={{ marginTop: '24px' }}><Spinner /></div>}

      {result && !loading && (
        <div style={{ marginTop: '28px', animation: 'fadeSlideUp 0.5s ease' }}>
          <div style={{ fontFamily: 'var(--fd)', fontSize: '17px', fontWeight: 700, marginBottom: '18px', paddingBottom: '12px', borderBottom: '1.5px solid var(--cb)', color: 'var(--tx)' }}>
            ✨ Suggested <span style={{ color: 'var(--p1)' }}>{result.mealType === 'full_day' ? 'Full Day' : result.meals[0]?.label} {result.label}</span> Plan
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: '16px', marginBottom: '20px' }}>
            {result.meals.map((meal, i) => (
              <div key={i} style={{
                borderRadius: 'var(--r)', overflow: 'hidden',
                border: '1.5px solid var(--cb)', background: 'var(--bg3)',
                boxShadow: 'var(--sh)', transition: 'var(--t)',
                animation: `cardIn 0.4s ease ${i * 0.1}s both`
              }}
              onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-5px)'; e.currentTarget.style.boxShadow = 'var(--sh2)'; }}
              onMouseLeave={e => { e.currentTarget.style.transform = 'none'; e.currentTarget.style.boxShadow = 'var(--sh)'; }}>
                <div style={{
                  height: '120px', display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: '3rem', background: `linear-gradient(135deg, ${cardColors[i % 4]}, ${cardColors[(i + 1) % 4]})`,
                }}>
                  {MEAL_EMOJIS[meal.label.toLowerCase()] || '🍽️'}
                </div>
                <div style={{ padding: '14px 16px' }}>
                  <div style={{ fontSize: '9px', fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--p1)', marginBottom: '4px' }}>{meal.label}</div>

// ===== HABIT INSIGHTS =====
function HabitInsights() {
  const [vals, setVals] = useState({ water: 4, exercise: 30, sleep: 7, meditation: 0, veggies: 3, mood: 7 });
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);

  const analyze = async () => {
    setLoading(true);
    setResult(null);
    await pause(900);

    const sc = (v, good, ok) => v >= good ? '✅' : v >= ok ? '🟡' : '❌';
    const scores = {
      water: sc(vals.water, 8, 5),
      exercise: sc(vals.exercise, 30, 15),
      sleep: sc(vals.sleep, 7, 6),
      meditation: sc(vals.meditation, 10, 5),
      veggies: sc(vals.veggies, 5, 3),
      mood: sc(vals.mood, 7, 5),
    };
    const wins = Object.values(scores).filter(s => s === '✅').length;
    const overall = wins >= 5 ? '🌟 Excellent day!' : wins >= 3 ? '👍 Good progress!' : '💪 Keep building momentum!';

    const improvements = [];
    if (vals.water < 8) improvements.push(`💧 Water: You had ${vals.water} glasses. Aim for 8+. Keep a water bottle visible on your desk.`);
    if (vals.exercise < 30) improvements.push(`🏃 Exercise: ${vals.exercise} min logged. Aim for 30+ min. A brisk evening walk counts!`);
    if (vals.sleep < 7) improvements.push(`😴 Sleep: ${vals.sleep} hrs is below the 7-hr target. Try shifting bedtime 30 min earlier tonight.`);
    if (vals.meditation < 10) improvements.push(`🧘 Mindfulness: Just 10 min of daily meditation reduces cortisol by 20%. Try a 5-min breathing session.`);
    if (vals.veggies < 5) improvements.push(`🥦 Vegetables: ${vals.veggies} servings. Add a handful of spinach or a fruit to your next meal.`);

    const tomorrowTip = improvements.length > 0
      ? improvements[Math.floor(Math.random() * Math.min(improvements.length, 2))]
      : "You're crushing it! Tomorrow, try 5 min of outdoor sunlight right after waking. Natural light resets your circadian rhythm and boosts energy for the whole day. ☀️";

    setResult({ scores, wins, overall, improvements: improvements.slice(0, 2), tomorrowTip });
    setLoading(false);
  };

  const fields = [
    { key: 'water', label: '💧 Water glasses today', min: 0, max: 20 },
    { key: 'exercise', label: '🏃 Exercise minutes', min: 0, max: 300 },
    { key: 'sleep', label: '😴 Sleep hours last night', min: 0, max: 12, step: 0.5 },
    { key: 'meditation', label: '🧘 Meditation minutes', min: 0, max: 120 },
    { key: 'veggies', label: '🍎 Fruits/Veggies servings', min: 0, max: 15 },
    { key: 'mood', label: '😊 Mood (1–10)', min: 1, max: 10 },
  ];

  const rowData = result ? [
    ['💧 Water', `${vals.water} glasses`, 'Target: 8+', result.scores.water],
    ['🏃 Exercise', `${vals.exercise} min`, 'Target: 30+ min', result.scores.exercise],
    ['😴 Sleep', `${vals.sleep} hours`, 'Target: 7–9 hrs', result.scores.sleep],
    ['🧘 Meditation', `${vals.meditation} min`, 'Target: 10+ min', result.scores.meditation],
    ['🍎 Fruits/Veggies', `${vals.veggies} servings`, 'Target: 5+', result.scores.veggies],
    ['😊 Mood', `${vals.mood}/10`, 'Target: 7+', result.scores.mood],
  ] : [];

  return (
    <Card>
      <div style={{ marginBottom: '20px' }}>
        <h2 style={{ fontFamily: 'var(--fd)', fontSize: '22px', fontWeight: 700, marginBottom: '5px', display: 'flex', alignItems: 'center', gap: '8px' }}>
          <span>📊</span> Habit Insights
        </h2>
        <p style={{ color: 'var(--tx2)', fontSize: '13px' }}>Log your daily habits and get AI-powered insights to help you stay on track.</p>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: '14px', marginBottom: '22px' }}>
        {fields.map(({ key, label, min, max, step }) => (
          <div key={key}>
            <label style={{ display: 'block', fontSize: '12px', fontWeight: 700, color: 'var(--tx2)', marginBottom: '5px' }}>{label}</label>
            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
              <input type="range" min={min} max={max} step={step || 1} value={vals[key]}
                onChange={e => setVals(v => ({ ...v, [key]: Number(e.target.value) }))}
                style={{ flex: 1, accentColor: 'var(--p1)', cursor: 'pointer' }}
              />
              <span style={{
                minWidth: '38px', textAlign: 'center', fontFamily: 'var(--fd)',
                fontSize: '18px', fontWeight: 700, color: 'var(--p1)'
              }}>{vals[key]}</span>
            </div>
          </div>
        ))}
      </div>

      <button onClick={analyze} disabled={loading} style={{
        display: 'inline-flex', alignItems: 'center', gap: '8px',
        padding: '13px 28px', background: 'var(--g1)', color: '#fff',
        border: 'none', borderRadius: '999px', fontFamily: 'var(--ff)',
        fontSize: '14px', fontWeight: 700, cursor: loading ? 'not-allowed' : 'pointer',
        transition: 'var(--t)', boxShadow: '0 4px 18px rgba(244,114,182,0.35)',
        opacity: loading ? 0.8 : 1
      }}>
        {loading ? '⏳ Analyzing…' : '📊 Analyze My Habits'}
      </button>

      {loading && <div style={{ marginTop: '24px' }}><Spinner /></div>}

      {result && !loading && (
        <div style={{ marginTop: '28px', animation: 'fadeSlideUp 0.5s ease' }}>
          {/* Overall */}
          <div style={{
            background: 'var(--g1)', borderRadius: 'var(--rs)', padding: '16px 20px', marginBottom: '18px', color: '#fff'
          }}>
            <div style={{ fontFamily: 'var(--fd)', fontSize: '20px', fontWeight: 700, marginBottom: '4px' }}>{result.overall}</div>
            <div style={{ fontSize: '13px', opacity: 0.9 }}>You scored {result.wins}/6 wellness habits today ✨</div>
          </div>

          {/* Score table */}
          <div style={{ background: 'var(--pxl)', borderRadius: 'var(--rs)', overflow: 'hidden', border: '1px solid var(--cb)', marginBottom: '16px' }}>
            {rowData.map(([label, val, target, score], i) => (
              <div key={i} style={{
                display: 'flex', alignItems: 'center', gap: '12px', padding: '11px 16px',
                borderBottom: i < rowData.length - 1 ? '1px solid var(--cb)' : 'none',
                background: i % 2 === 0 ? 'transparent' : 'rgba(244,114,182,0.02)',
                animation: `cardIn 0.3s ease ${i * 0.07}s both`
              }}>
                <span style={{ fontSize: '18px' }}>{score}</span>
                <span style={{ flex: 1, fontSize: '13px', fontWeight: 600 }}>{label}</span>
                <span style={{ fontSize: '13px', color: 'var(--p1)', fontWeight: 700, minWidth: '70px', textAlign: 'right' }}>{val}</span>
                <span style={{ fontSize: '11px', color: 'var(--tx3)', minWidth: '90px', textAlign: 'right' }}>{target}</span>
              </div>
            ))}
          </div>

          {/* Improvements */}
          {result.improvements.length > 0 && (
            <div style={{ marginBottom: '14px' }}>
              <div style={{ fontFamily: 'var(--fd)', fontSize: '15px', fontWeight: 700, color: 'var(--p3)', marginBottom: '8px' }}>🎯 Top Areas to Improve</div>
              {result.improvements.map((item, i) => (
                <div key={i} style={{
                  background: 'var(--bg3)', border: '1px solid var(--cb)', borderRadius: 'var(--rs)',
                  padding: '11px 14px', marginBottom: '7px', fontSize: '13px', color: 'var(--tx2)',
                  animation: `cardIn 0.35s ease ${i * 0.1}s both`
                }}>{item}</div>
              ))}
            </div>
          )}

          {/* Tomorrow tip */}
          <div style={{
            background: 'var(--g2)', border: '1px solid var(--cb)', borderRadius: 'var(--rs)',
            padding: '14px 18px', animation: 'cardIn 0.4s ease 0.2s both'
          }}>
            <div style={{ fontFamily: 'var(--fd)', fontSize: '15px', fontWeight: 700, color: 'var(--p3)', marginBottom: '6px' }}>💡 One Action for Tomorrow</div>
            <p style={{ fontSize: '13px', color: 'var(--tx2)', lineHeight: 1.6 }}>{result.tomorrowTip}</p>
          </div>
        </div>
      )}
    </Card>
  );
}

// ===== FLOATING BLOBS =====
function Blobs() {
  return (
    <>
      {[
        { size: 440, bg: 'radial-gradient(circle, rgba(244,114,182,0.22) 0%, rgba(252,231,243,0.15) 100%)', top: '-120px', right: '-80px', dur: '12s' },
        { size: 360, bg: 'radial-gradient(circle, rgba(192,132,252,0.18) 0%, rgba(237,233,254,0.12) 100%)', bottom: '-80px', left: '-60px', dur: '15s', delay: '0s', reverse: true },
        { size: 280, bg: 'radial-gradient(circle, rgba(244,114,182,0.12) 0%, rgba(252,231,243,0.08) 100%)', top: '40%', left: '45%', dur: '18s', delay: '3s' },
      ].map((b, i) => (
        <div key={i} style={{
          position: 'fixed', width: b.size, height: b.size, borderRadius: '50%',
          background: b.bg, filter: 'blur(70px)', opacity: 0.8,
          top: b.top, bottom: b.bottom, right: b.right, left: b.left,
          pointerEvents: 'none', zIndex: 0,
          animation: `blobFloat ${b.dur} ease-in-out infinite ${b.delay || '0s'} ${b.reverse ? 'reverse' : ''}`
        }}/>
      ))}
    </>
  );
}

// ===== MAIN APP =====
const TABS = [
  { id: 'coach', icon: '💬', label: 'Glow Coach' },
  { id: 'planner', icon: '📅', label: 'Daily Planner' },
  { id: 'meals', icon: '🥗', label: 'Meal Suggester' },
  { id: 'habits', icon: '📊', label: 'Habit Insights' },
];

function App() {
  const [activeTab, setActiveTab] = useState('coach');
  const [theme, setTheme] = useState(() => {
    try { const s = localStorage.getItem('gd2'); if (s) return JSON.parse(s).theme || 'pink'; } catch(e) {}
    return 'pink';
  });

  useEffect(() => {
    const themeMap = { pink: '', lavender: 'lavender', beige: 'beige', dark: 'dark' };
    document.documentElement.setAttribute('data-theme', themeMap[theme] || '');
  }, [theme]);

  // Sync theme from main app
  useEffect(() => {
    const check = () => {
      try {
        const s = localStorage.getItem('gd2');
        if (s) {
          const d = JSON.parse(s);
          if (d.theme && d.theme !== theme) setTheme(d.theme);
        }
      } catch(e) {}
    };
    const id = setInterval(check, 1000);
    return () => clearInterval(id);
  }, [theme]);

  return (
    <div style={{ minHeight: '100vh', position: 'relative' }}>
      <Blobs />

      <div style={{ position: 'relative', zIndex: 1, maxWidth: '960px', margin: '0 auto', padding: '28px 20px 60px' }}>

        {/* Back button */}
        <div style={{ marginBottom: '20px', animation: 'fadeSlideDown 0.4s ease' }}>
          <a href="../index.html" className="back-btn">← Back to GlowUp Diary</a>
        </div>

        {/* Header */}
        <header style={{ textAlign: 'center', marginBottom: '28px', animation: 'fadeSlideDown 0.6s ease' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '10px', marginBottom: '6px' }}>
            <span style={{ fontSize: '2rem' }}>🌸</span>
            <h1 style={{
              fontFamily: 'var(--fd)', fontSize: '2.2rem', fontWeight: 700,
              background: 'var(--g1)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
              backgroundClip: 'text'
            }}>AI Wellness Hub</h1>
          </div>
          <p style={{ fontSize: '13px', color: 'var(--tx2)', fontWeight: 400 }}>
            Your smart wellness companion — powered by GlowUp Diary ✨
          </p>
        </header>

        {/* Tab Navigation */}
        <TabNav tabs={TABS} active={activeTab} onChange={setActiveTab} />

        {/* Tab Content */}
        <div key={activeTab} style={{ animation: 'fadeSlideUp 0.4s ease' }}>
          {activeTab === 'coach' && <GlowCoach />}
          {activeTab === 'planner' && <DailyPlanner />}
          {activeTab === 'meals' && <MealSuggester />}
          {activeTab === 'habits' && <HabitInsights />}
        </div>

        {/* Footer */}
        <div style={{ textAlign: 'center', marginTop: '40px', color: 'var(--tx3)', fontSize: '12px' }}>
          Made with 💖 for your glow-up journey
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
